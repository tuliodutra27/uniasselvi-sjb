services:
  uniasselvi-sjb:
    build: .
    container_name: uniasselvi-sjb
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DB_PATH=/app/data/student_tracker.db
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/uploads

x-casaos:
  title:
    en_us: Uniasselvi SJB
  hostname: uniasselvi-sjb.homelab
  scheme: http
  port_map: "5000"
  index: /
  icon: https://cdn-icons-png.flaticon.com/512/2436/2436874.png
