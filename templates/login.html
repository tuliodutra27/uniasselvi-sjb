{% extends "base.html" %}
{% block title %}Login – Indicador de Matrículas{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-mortarboard-fill text-primary" style="font-size:2.5rem"></i>
          <h4 class="mt-2 mb-0">Indicador de Matrículas</h4>
          <p class="text-muted small">Entre com suas credenciais para continuar</p>
        </div>

        <form method="post" action="{{ url_for('login', next=request.args.get('next','')) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuário</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control"
                     placeholder="Nome de usuário" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control"
                     placeholder="Senha" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
