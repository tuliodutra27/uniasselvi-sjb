{% extends "base.html" %}
{% block title %}Configuração Inicial – Indicador de Matrículas{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem"></i>
          <h4 class="mt-2 mb-1">Primeira execução</h4>
          <p class="text-muted small">Crie a conta de administrador para continuar</p>
        </div>

        <div class="alert alert-info py-2 small">
          <i class="bi bi-info-circle me-1"></i>
          Esta conta terá acesso total ao sistema, incluindo gerenciamento de usuários.
        </div>

        <form method="post" action="{{ url_for('setup') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nome de usuário</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control"
                     placeholder="ex: admin" autofocus required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control"
                     placeholder="Mínimo 6 caracteres" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" name="confirm" class="form-control"
                     placeholder="Repita a senha" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i>Criar administrador
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
